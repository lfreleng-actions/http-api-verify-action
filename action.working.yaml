---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2025 The Linux Foundation

# http-api-verify-action
name: '🛠️ Check API/Service Availability'
description: 'Tests an HTTP/HTTPS API endpoint for service availability'

inputs:
  # Mandatory
  url:
    # Example: "http://username:password@127.0.0.1:8080/index.yaml"
    description: 'URL of API server/interface to check'
    required: false
    type: 'string'
  auth_string:
    # Parsed from the URL string above, but can be provided explicitly
    # Should be in the format used by cURL, e.g. username:password
    # Will be passed to cURL using the flag: curl -c "username:password"
    description: 'Authentication string, colon separated username/password'
    required: false
    type: 'string'
  service_name:
    # Example: 'ChartMuseum Repository'
    description: 'Name of HTTP/HTTPS API service tested'
    required: false
    type: 'string'
    default: 'API Service'
  initial_sleep_time:
    description: 'Time in seconds between API service connection attempts'
    required: false
    type: 'integer'
    # Try once every second
    default: 1
  max_delay:
    description: 'Maximum delay in seconds between retries'
    required: false
    type: 'integer'
    default: 30
  retries:
    description: 'Number of retries before declaring service unavailable'
    required: false
    type: 'integer'
    default: 3
  expected_http_code:
    description: 'HTTP response code to accept from the API service'
    required: false
    type: 'integer'
    default: 200
  regex:
    # Extended regular expression; uses grep with the "-E" flag
    description: 'Verify server response with regular expression'
    required: false
    type: 'string'
  show_header_json:
    description: "Display response header as JSON in action output"
    required: false
    type: 'boolean'
    default: false
  curl_timeout:
    description: 'Maximum time in seconds for cURL to wait for a response'
    required: false
    type: 'integer'
    default: 5
  http_method:
    description: 'HTTP method to use (GET, POST, PUT, etc.)'
    required: false
    type: 'string'
    default: 'GET'
  request_body:
    description: 'Data to send with POST/PUT/PATCH requests'
    required: false
    type: 'string'
  content_type:
    description: 'Content type of the request body'
    required: false
    type: 'string'
    default: 'application/json'
  request_headers:
    description: 'Custom HTTP headers sent in JSON format'
    required: false
    type: 'string'
  verify_ssl:
    description: 'Verify SSL certificates'
    required: false
    type: 'boolean'
    default: true
  include_response_body:
    description: 'Include response body in outputs (base64 encoded)'
    required: false
    type: 'boolean'
    default: false
  follow_redirects:
    description: 'Follow HTTP redirects'
    required: false
    type: 'boolean'
    default: true
  max_response_time:
    description: 'Maximum acceptable response time in seconds'
    required: false
    type: 'number'
    default: 0
  connection_reuse:
    description: 'Reuse connections between requests'
    required: false
    type: 'boolean'
    default: true
  debug:
    description: 'Enables cURL/action debugging'
    required: false
    type: 'boolean'
    default: false
  fail_on_timeout:
    description: 'Fail the action if response time exceeds max_response_time'
    required: false
    type: 'boolean'
    default: false

outputs:
  time_delay:
    description: 'Number of seconds waiting for service availability/failure'
    value: "${{ steps.check.outputs.time_delay }}"
  response_http_code:
    description: 'HTTP response code received from the server'
    value: "${{ steps.check.outputs.response_http_code }}"
  response_header_json:
    description: 'HTTP response header as JSON'
    value: "${{ steps.check.outputs.response_header_json }}"
  response_header_size:
    description: 'HTTP response header size in bytes'
    value: "${{ steps.check.outputs.response_header_size }}"
  response_body_size:
    description: 'HTTP response body size in bytes'
    value: "${{ steps.check.outputs.response_body_size }}"
  regex_match:
    description: 'Whether the regular expression matched the server reply'
    value: "${{ steps.check.outputs.regex_match }}"
  response_body_base64:
    description: 'Response body base64 encoded (when include_response_body set)'
    value: "${{ steps.check.outputs.response_body_base64 }}"
  total_time:
    description: 'Total time for the request in seconds'
    value: "${{ steps.check.outputs.total_time }}"
  connect_time:
    description: 'Time to establish connection in seconds'
    value: "${{ steps.check.outputs.connect_time }}"
  response_time_exceeded:
    description: 'Whether response time exceeded maximum acceptable time'
    value: "${{ steps.check.outputs.response_time_exceeded }}"

runs:
  using: 'composite'
  steps:
    - name: 'Validate inputs and cURL version'
      shell: bash
      run: |
        # Validate action inputs
        if [ -z "${{ inputs.url }}" ]; then
          echo 'Error: a URL must be provided as input ❌'; exit 1
        # Delay time and retries cannot be zero
        elif ! [[ "${{ inputs.initial_sleep_time }}" =~ ^[0-9]+$ ]]; then
          echo "Error: initial sleep time must be a positive integer ❌"; exit 1
        elif ! [[ "${{ inputs.max_delay }}" =~ ^[0-9]+$ ]]; then
          echo "Error: maximum delay time must be a positive integer ❌"; exit 1
        elif ! [[ "${{ inputs.retries }}" =~ ^[0-9]+$ ]]; then
          echo "Error: number of retries must be a positive integer ❌"; exit 1
        elif ! [[ "${{ inputs.curl_timeout }}" =~ ^[0-9]+$ ]]; then
          echo "Error: curl_timeout must be a positive integer ❌"; exit 1
        elif ! [[ "${{ inputs.expected_http_code }}" =~ ^[1-5][0-9]{2}$ ]]; then
          echo "Error: HTTP response code must be 1xx-5xx ❌"; exit 1
        fi
        if [ "${{ inputs.http_method }}" != 'GET' ] && \
          [ "${{ inputs.http_method }}" != 'POST' ] && \
          [ "${{ inputs.http_method }}" != 'PUT' ] && \
          [ "${{ inputs.http_method }}" != 'DELETE' ] && \
          [ "${{ inputs.http_method }}" != 'PATCH' ]; then
          echo "Error: HTTP method must be GET, POST, PUT, DELETE, or PATCH ❌"
          exit 1
        fi

        # Validate regex if provided
        if [ -n "${{ inputs.regex }}" ]; then
          # Test regex syntax by disabling error exit temporarily
          set +e
          echo "" | grep -E "${{ inputs.regex }}" >/dev/null 2>&1
          regex_exit_code=$?
          set -e

          # Exit code 2 indicates regex syntax error, 1 is no match (OK)
          if [ $regex_exit_code -eq 2 ]; then
            echo "Error: Invalid regular expression syntax ❌"
            echo "Regex: ${{ inputs.regex }}"
            exit 1
          fi
          echo "Regular expression validated ✅"
        fi

        curl_cmd=$(which curl)
        if [ ! -x "$curl_cmd" ]; then
          echo 'Error: cURL command not found ❌'; exit 1
        fi
        # Utility function to compare version strings
        compare_versions()
        {
          for i in 1 2 3
          do
            part1=$(echo "$1" | cut -d "." -f $i)
            part2=$(echo "$2" | cut -d "." -f $i)
            if [ "$part1" -lt "$part2" ]
            then
              return 0
            elif [ "$part1" -gt "$part2" ]
            then
              return 1
            fi
          done
          return 1
        }
        # Ensure cURL version must be at least 8.3.0
        curl_version=$(curl --version | head -1 | awk '{print $2}')
        if (compare_versions "$curl_version" "8.3.0"); then
          echo "Error: cURL version must be 8.3.0 or higher ❌"; exit 1
        fi

    - name: "Check API/Service Availability"
      id: check
      shell: bash
      # yamllint disable rule:line-length
      run: |
        # Check API/Service Availability

        url="${{ inputs.url }}"
        # Fall back to environment variable if input not provided
        if [ -z "$url" ]; then
          url="${HTTP_API_URL:-}"
        fi
        service_name="${{ inputs.service_name }}"
        sleep_time="${{ inputs.initial_sleep_time }}"
        retries="${{ inputs.retries }}"
        max_delay="${{ inputs.max_delay }}"
        curl_timeout="${{ inputs.curl_timeout }}"
        http_code="${{ inputs.expected_http_code }}"
        auth_string="${{ inputs.auth_string }}"
        show_header_json_lower=$(echo "${{ inputs.show_header_json }}" |\
          tr '[:upper:]' '[:lower:]')
        debug_lower=$(echo "${{ inputs.debug }}" |\
          tr '[:upper:]' '[:lower:]')
        counter='0'
        time_delay='0'
        response_http_code='0'
        response_header_size='0'
        response_body_size='0'

        # Define function to conditionally output/dump response
        dumpResponse() {
          if [ "$response_header_size" -gt 0 ] && \
            [ "f$show_header_json_lower" = 'ftrue' ]; then
            echo "Header JSON Output 📄"
            echo "$header_json" | jq -C -r '.'
          elif [ "$response_body_size" -gt 0 ] && \
            [ "f$debug_lower" = 'ftrue' ] && [ -f response_body ]; then
            echo "Reply Body 🐞"
            cat response_body
          fi
        }

        cleanupTempFiles() {
          rm -f response_body
          echo "Cleaned up temporary files"
        }
        # Cleanup temporary files and show debug output on exit/error
        trap "dumpResponse; cleanupTempFiles" EXIT ERR

        if [ "f$debug_lower" = 'ftrue' ]; then
          echo "Debugging Requested 🐞"
          # Don't silence grep command output during response testing
          grep_cmd='grep'
        else
          grep_cmd='grep -q'
        fi

        # Define a function to parse URLs
        parseString() {
          protocol=$(echo "$1" | grep "://" | sed -e's,^\(.*://\).*,\1,g')
          string_no_protocol="${1/$protocol/}"
          protocol=$(echo "$protocol" | \
            tr '[:upper:]' '[:lower:]' | sed 's:\://::')

          # When authentication not explicitly provided, attempt to parse URL
          if [ -z "${{ inputs.auth_string }}" ]; then
            userpass=$(echo "$string_no_protocol" | grep "@" | \
              cut -d"/" -f1 | rev | cut -d"@" -f2- | rev || true)
            password=$(echo "$userpass" | grep ":" | cut -d":" -f2 || true)
            if [ -n "$password" ]; then
              username=$(echo "$userpass" | grep ":" | cut -d":" -f1 || true)
            else
              username="$userpass"
            fi
            if [ -n "$userpass" ]; then
              echo "Credentials not explicitly provided; parsed from URL 💬"
            fi
          fi

          # Extract host information
          hostport=$(echo "${string_no_protocol/$userpass@/}" |\
            cut -d"/" -f1 || true)
          host=$(echo "$hostport" | cut -d":" -f1 || true)
          api_port=$(echo "$hostport" | grep ":" | cut -d":" -f2 || true)
          path=$(echo "$string_no_protocol" | grep "/" | cut -d"/" -f2- || true)
        }

        # Parse the URL to extract components
        parseString $url

        # Set the port number based on the protocol if not in the URL
        if [ -z "$api_port" ] && [ "$protocol" = 'http' ]; then
          api_port='80'
        elif [ -z "$api_port" ] && [ "$protocol" = 'https' ]; then
          api_port='443'
        fi

        echo "# $service_name" >> "$GITHUB_STEP_SUMMARY"
        echo "### Check API/Service Availability 🌍" \
          >> "$GITHUB_STEP_SUMMARY"

        # Build cURL Command with required options
        # ========================================

        # Base command with core options
        curl_cmd="curl -s --max-time $curl_timeout -X ${{ inputs.http_method }}"

        # Request body and content type
        if [ -n "${{ inputs.request_body }}" ]; then
          echo "::add-mask::${{ inputs.request_body }}"
          curl_cmd="$curl_cmd -H 'Content-Type: ${{ inputs.content_type }}' \
            -d '${{ inputs.request_body }}'"
        fi

        # Custom headers
        if [ -n "${{ inputs.request_headers }}" ]; then
          echo "Adding custom send header JSON 📋"
          request_headers=$(echo '${{ inputs.request_headers }}' |\
            jq -r 'to_entries[] | "-H \"" + .key + ": " + .value + "\""')
          curl_cmd="$curl_cmd $request_headers"
        fi

        # Authentication
        if [ -n "$auth_string" ]; then
          echo "Authentication credentials provided 💬"
          curl_cmd="$curl_cmd -u $auth_string"
          echo "::add-mask::$auth_string"
        fi

        # SSL/TLS options
        if [ "f${{ inputs.verify_ssl }}" != "ftrue" ]; then
          curl_cmd="$curl_cmd -k"
          echo "Warning: SSL certificate verification disabled ⚠️"
        fi

        # Connection options
        if [ "f${{ inputs.connection_reuse }}" != "ftrue" ]; then
          curl_cmd="$curl_cmd --no-keepalive"
        fi

        # Redirect handling
        if [ "f${{ inputs.follow_redirects }}" = "ftrue" ]; then
          curl_cmd="$curl_cmd -L"
        else
          curl_cmd="$curl_cmd --max-redirs 0"
        fi

        # Response body handling - use --head only when response body not needed
        include_response_body_lower=$(echo "${{ inputs.include_response_body }}" |\
          tr '[:upper:]' '[:lower:]')
        if [ -z "${{ inputs.regex }}" ] && \
           [ "f$include_response_body_lower" != "ftrue" ] && \
           [ "f$debug_lower" != "ftrue" ]; then
          curl_cmd="$curl_cmd --head"
        fi

        # Output format string for parsing response data
        output_string="TOTAL_TIME:%{time_total}|CONNECT_TIME:%{time_connect}|HTTP_CODE:%{http_code}|BODY_SIZE:%{size_download}|HEADER_SIZE:%{size_header}|HEADER_JSON:%{header_json}"

        if [ "f$debug_lower" = 'ftrue' ]; then
          echo "🐞 Using: curl_cmd -w \"TOTAL_TIME:\${time_total}|CONNECT_TIME:\${time_connect}|...\" ${url} -o response_body"
        fi
        # Start retry/test loop until server responds or timeout/retries expire
        while true; do
          # Increment the retry counter
          counter=$((counter + 1))

          # Temporarily disable exit on error to handle retries gracefully
          set +e

          # Run cURL command to check API/Service availability 🚀
          curl_output=$($curl_cmd -w "$output_string" "${url}" -o response_body 2>/dev/null)
          curl_exit_code=$?
          if [ $curl_exit_code -ne 0 ]; then
            echo "cURL error code: $curl_exit_code"
            case $curl_exit_code in
              1) echo "Error: Unsupported protocol ❌" ;;
              3) echo "Error: URL malformed ❌" ;;
              5) echo "Error: Couldn't resolve proxy ❌" ;;
              6) echo "Error: Couldn't resolve host ❌" ;;
              7) echo "Error: Failed to connect to host ❌" ;;
              28) echo "Error: Request timeout ❌" ;;
              # Immediately exit on these errors, as retries add no value
              35)
                echo "Error: SSL connect error ❌" >> "$GITHUB_STEP_SUMMARY"
                echo "Error: SSL connect error ❌"
                exit 1
                ;;
              51)
                echo "Error: The peer's SSL certificate is not OK ❌" \
                  >> "$GITHUB_STEP_SUMMARY"
                echo "Error: The peer's SSL certificate is not OK ❌"
                exit 1
                ;;
              52) echo "Error: Nothing was returned from the server ❌" ;;
              60)
                echo "Error: SSL self-signed certificate ❌" >> "$GITHUB_STEP_SUMMARY"
                echo "Error: SSL self-signed certificate ❌"
                exit 1
                ;;
              *) echo "Error: cURL encountered an error (code $curl_exit_code) ❌" ;;
            esac
          fi
          # Re-enable exit on error for subsequent commands
          set -e

          if [ "f$debug_lower" = 'ftrue' ]; then
            echo "🐞 cURL execution completed with exit code: $curl_exit_code"
            echo "🐞 Raw cURL output: $curl_output"
          fi

          # We can populate the response variables only if cURL was successful
          if [ "$curl_exit_code" -eq 0 ]; then
            # Parse the labeled output from cURL more robustly
            # Extract each field by its label to avoid issues with JSON commas
            total_time=$(echo "$curl_output" | grep -o 'TOTAL_TIME:[^|]*' | cut -d':' -f2)
            connect_time=$(echo "$curl_output" | grep -o 'CONNECT_TIME:[^|]*' | cut -d':' -f2)
            response_http_code=$(echo "$curl_output" | grep -o 'HTTP_CODE:[^|]*' | cut -d':' -f2)
            response_body_size=$(echo "$curl_output" | grep -o 'BODY_SIZE:[^|]*' | cut -d':' -f2)
            response_header_size=$(echo "$curl_output" | grep -o 'HEADER_SIZE:[^|]*' | cut -d':' -f2)

            # Extract header JSON more carefully - everything after HEADER_JSON:
            header_json_raw=$(echo "$curl_output" | sed 's/.*HEADER_JSON://')

            # Process header JSON if available
            if [ -n "$header_json_raw" ] && [ "$header_json_raw" != "null" ]; then
              header_json=$(echo "$header_json_raw" | jq -c '.' 2>/dev/null || echo "{}")
            else
              header_json="{}"
            fi

            if [ "f$debug_lower" = 'ftrue' ]; then
              echo "🐞 Parsed values:"
              echo "🐞   Total time: $total_time"
              echo "🐞   Connect time: $connect_time"
              echo "🐞   HTTP code: $response_http_code"
              echo "🐞   Body size: $response_body_size"
              echo "🐞   Header size: $response_header_size"
            fi
          fi

          # Set action outputs
          echo "response_http_code=$response_http_code" >> "$GITHUB_OUTPUT"
          echo "response_header_json=$header_json" >> "$GITHUB_OUTPUT"
          echo "response_header_size=$response_header_size" >> "$GITHUB_OUTPUT"
          echo "response_body_size=$response_body_size" >> "$GITHUB_OUTPUT"
          echo "total_time=$total_time" >> "$GITHUB_OUTPUT"
          echo "connect_time=$connect_time" >> "$GITHUB_OUTPUT"

          # Multi-line output needs special handling
          include_response_body_lower=$(echo "${{ inputs.include_response_body }}" |\
            tr '[:upper:]' '[:lower:]')
          if [ "f$include_response_body_lower" = "ftrue" ] && [ -f response_body ]; then
            # Use GitHub Actions multiline output format
            echo "response_body_base64<<EOF" >> "$GITHUB_OUTPUT"
            base64 response_body >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

          if [ "f$debug_lower" = 'ftrue' ]; then
            echo "Query Information 🐞"
            echo "Attempt: $counter / $retries"
            echo "Delay/Wait Interval: $sleep_time seconds"
            echo "Delay/Wait Current Value: $time_delay seconds"
            echo "Response Code: $response_http_code"
            echo "Header Size: $response_header_size bytes"
            echo "Body Size: $response_body_size bytes"
          fi

          if [ "$response_http_code" -eq "$http_code" ]; then
            echo "$protocol://$host:$api_port ✅" >> "$GITHUB_STEP_SUMMARY"
            echo "$protocol://$host:$api_port ✅"
            echo "Returned status code: $response_http_code"
            if [ "$counter" -gt 1 ]; then
              echo "Time taken for service availability: $time_delay 💬"
              echo "time_delay=$time_delay" >> "$GITHUB_OUTPUT"
            fi
            if [ -z "${{ inputs.regex }}" ]; then
              # No further validation needed when no RegEx supplied
              break
            fi

            # Validate response time if max_response_time is specified
            if [ "${{ inputs.max_response_time }}" != "0" ] && [ -n "$total_time" ]; then
              if (( $(echo "$total_time > ${{ inputs.max_response_time }}" | bc -l) )); then
                echo "Warning: Response time exceeded maximum ($total_time > ${{ inputs.max_response_time }} seconds) ⚠️"
                echo "response_time_exceeded=true" >> "$GITHUB_OUTPUT"
                # Add to step summary
                echo "| Response Time | ⚠️ $total_time seconds (exceeded limit of ${{ inputs.max_response_time }}) |" >> "$GITHUB_STEP_SUMMARY"

                # Check if we should fail on timeout
                if [ "f${{ inputs.fail_on_timeout }}" = "ftrue" ]; then
                  echo "Error: Response time exceeded maximum allowed time ❌" \
                    >> "$GITHUB_STEP_SUMMARY"
                  echo "Error: Response time exceeded maximum allowed time ❌"
                  exit 1
                fi
              else
                echo "Response time within acceptable limit ($total_time <= ${{ inputs.max_response_time }} seconds) ✅"
                echo "response_time_exceeded=false" >> "$GITHUB_OUTPUT"
                # Add to step summary
                echo "| Response Time | ✅ $total_time seconds |" >> "$GITHUB_STEP_SUMMARY"
              fi
            else
              # Default value when validation is not performed
              echo "response_time_exceeded=false" >> "$GITHUB_OUTPUT"
            fi

            echo "Regular expression provided; validating response/reply"
            if [ ! -f response_body ]; then
              echo "Error: regex validation requested, but response empty ❌"
              exit 1
            else
              if $grep_cmd -E "${{ inputs.regex }}" response_body; then
                echo "RegEx matched server reply/body ✅"\
                  >> "$GITHUB_STEP_SUMMARY"
                echo "RegEx matched server reply/body ✅"
                echo "regex_match=true" >> "$GITHUB_OUTPUT"
              else
                echo "Warning: RegEx NOT matched server reply/body ⚠️" \
                  >> "$GITHUB_STEP_SUMMARY"
                echo "Warning: RegEx NOT matched server reply/body ⚠️"
                echo "regex_match=false" >> "$GITHUB_OUTPUT"
              fi
            fi
            break
          fi

          # Exhausted all timer values/retries
          if [ "$counter" -eq "$retries" ]; then
            echo "time_delay=$time_delay" >> "$GITHUB_OUTPUT"
            echo "$protocol://$host:$api_port" >> "$GITHUB_STEP_SUMMARY"
            echo "$protocol://$host:$api_port"
            echo "Error: service marked failed at $time_delay seconds ❌" \
              >> "$GITHUB_STEP_SUMMARY"
            echo "Error: service marked failed at $time_delay seconds ❌"

            # Provide feedback on common response codes
            if [ "$response_http_code" -eq '401' ]; then
              echo "Unauthorized; check/supply valid API/service credentials ⚠️"
            elif [ "$response_http_code" -eq '404' ]; then
              echo "Not Found; verify the URL or endpoint ⚠️"
            elif [ "$response_http_code" -ge '500' ]; then
              echo "Server Error; the API might be down or overloaded ⚠️"
            fi
            exit 1
          fi

          # Prepare for the next service availability check
          echo "Waiting for $sleep_time seconds before retrying..."
          sleep "$sleep_time"
          time_delay=$((time_delay + sleep_time))
          # Exponential backoff; increase delay between retries dynamically
          sleep_time=$((sleep_time * (2 ** counter)))
          # But also cap maximum delay to avoid excessive wait times
          if [ "$sleep_time" -gt "$max_delay" ]; then
            sleep_time=$max_delay
          fi
          echo "Sleep/wait time for next attempt: $sleep_time seconds"
        done
